# Builds the Windows installer on every version tag and publishes it (plus the
# updater artifacts + latest.json feed) to a GitHub Release. The in-app updater
# points at .../releases/latest/download/latest.json.
#
# Required repo secrets:
#   TAURI_SIGNING_PRIVATE_KEY           minisign key for updater artifacts
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  its password ("" if none)
#
# Authenticode (SmartScreen) signing is a documented opt-in — when the Azure
# Trusted Signing account exists, follow docs/DISTRIBUTION.md §"Wiring the
# signature into CI" (adds AZURE_* secrets + a signCommand in tauri.conf.json).
# Until then installers are unsigned and testers see the SmartScreen prompt.
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Baked-in beta OAuth client so testers skip the Google-console setup
          # (optional — builds without it still accept pasted credentials)
          ZENBOX_GMAIL_CLIENT_ID: ${{ secrets.ZENBOX_GMAIL_CLIENT_ID }}
          ZENBOX_GMAIL_CLIENT_SECRET: ${{ secrets.ZENBOX_GMAIL_CLIENT_SECRET }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ZenBox Mail ${{ github.ref_name }}"
          releaseBody: |
            ZenBox Mail ${{ github.ref_name }} — download the Windows installer
            below (`ZenBox.Mail_*_x64-setup.exe`). Existing installs update
            themselves automatically.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
